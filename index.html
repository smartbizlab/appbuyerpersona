                                            <span className="text-teal-400 font-extrabold uppercase tracking-widest text-[9px] sm:text-[10px]">Módulo 1: Tu Inventario de Sospechas (La P.U.V.)</span>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div className="space-y-1.5">
                                                    <label className="block text-slate-300 font-bold">1. ¿Qué problema o necesidad asumes que resuelves?</label>
                                                    <input 
                                                        type="text"
                                                        value={suspectNeed}
                                                        onChange={(e) => setSuspectNeed(e.target.value)}
                                                        placeholder="Ej: Escribir textos de venta les toma días enteros de fatiga."
                                                        className="w-full bg-slate-900 border border-slate-800 p-3 rounded-xl focus:outline-none focus:ring-1 focus:ring-teal-500 text-slate-100 text-xs sm:text-sm"
                                                        required
                                                    />
                                                </div>
                                                <div className="space-y-1.5">
                                                    <label className="block text-slate-300 font-bold">2. ¿A quién crees que se lo solucionas?</label>
                                                    <input 
                                                        type="text"
                                                        value={suspectWho}
                                                        onChange={(e) => setSuspectWho(e.target.value)}
                                                        placeholder="Ej: Emprendedores digitales y consultores."
                                                        className="w-full bg-slate-900 border border-slate-800 p-3 rounded-xl focus:outline-none focus:ring-1 focus:ring-teal-500 text-slate-100 text-xs sm:text-sm"
                                                        required
                                                    />
                                                </div>
                                            </div>
                                        </div>

                                        <div className="space-y-4 pt-4 border-t border-slate-800">
                                            <div className="flex flex-col md:flex-row md:items-center justify-between gap-2">
                                                <span className="text-teal-400 font-extrabold uppercase tracking-widest text-[9px] sm:text-[10px]">Módulo 2: Datos Netnográficos Reales (Grounding Data)</span>
                                            </div>
                                            <textarea
                                                value={rawNetnography}
                                                onChange={(e) => setRawNetnography(e.target.value)}
                                                placeholder="Pega testimonios literales o quejas de foros, Amazon, etc..."
                                                className="w-full h-32 bg-slate-900 border border-slate-800 p-3 rounded-xl focus:outline-none focus:ring-1 focus:ring-teal-500 text-slate-100 font-mono text-xs sm:text-sm"
                                                required
                                            />
                                        </div>

                                        <div className="space-y-4 pt-4 border-t border-slate-800">
                                            <span className="text-teal-400 font-extrabold uppercase tracking-widest text-[9px] sm:text-[10px]">Módulo 3: Jobs-to-be-Done (La Motivación)</span>
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                                <div className="space-y-1.5">
                                                    <label className="block text-slate-300 font-bold">1. Job Funcional (Tarea técnica)</label>
                                                    <input 
                                                        type="text"
                                                        value={jobFunctional}
                                                        onChange={(e) => setJobFunctional(e.target.value)}
                                                        placeholder="Ej: Escribir copys rápido."
                                                        className="w-full bg-slate-900 border border-slate-800 p-2.5 rounded-xl focus:outline-none text-slate-100 text-xs sm:text-sm"
                                                    />
                                                </div>
                                                <div className="space-y-1.5">
                                                    <label className="block text-slate-300 font-bold">2. Job Emocional (¿Cómo sentirse?)</label>
                                                    <input 
                                                        type="text"
                                                        value={jobEmotional}
                                                        onChange={(e) => setJobEmotional(e.target.value)}
                                                        placeholder="Ej: Sentirme tranquilo con el tono."
                                                        className="w-full bg-slate-900 border border-slate-800 p-2.5 rounded-xl focus:outline-none text-slate-100 text-xs sm:text-sm"
                                                    />
                                                </div>
                                                <div className="space-y-1.5">
                                                    <label className="block text-slate-300 font-bold">3. Job Social (¿Cómo ser percibido?)</label>
                                                    <input 
                                                        type="text"
                                                        value={jobSocial}
                                                        onChange={(e) => setJobSocial(e.target.value)}
                                                        placeholder="Ej: Parecer experto y empático."
                                                        className="w-full bg-slate-900 border border-slate-800 p-2.5 rounded-xl focus:outline-none text-slate-100 text-xs sm:text-sm"
                                                    />
                                                </div>
                                            </div>
                                        </div>

                                        <div className="p-4 bg-slate-900 rounded-xl border border-teal-500/10 space-y-2">
                                            <label className="block text-slate-300 font-bold text-xs sm:text-sm">Gemini API Key (Opcional)</label>
                                            <input 
                                                type="password"
                                                value={apiKey}
                                                onChange={(e) => setApiKey(e.target.value)}
                                                placeholder="Ingresa tu clave de API si tienes una..."
                                                className="w-full bg-slate-950 border border-slate-800 p-2 rounded-lg text-xs font-mono text-teal-300"
                                            />
                                        </div>

                                        <div className="flex flex-col sm:flex-row gap-3 justify-between pt-2 border-t border-slate-800">
                                            <button
                                                type="button"
                                                onClick={copyPromptCric}
                                                className="bg-slate-900 hover:bg-slate-800 text-slate-300 font-bold px-4 py-3 rounded-xl border border-slate-800 text-xs"
                                            >
                                                Copiar Prompt C.R.I.C. Maestro
                                            </button>
                                            <button
                                                type="submit"
                                                disabled={isGenerating}
                                                className="bg-gradient-to-r from-teal-500 to-emerald-400 text-slate-950 font-black px-6 py-3 rounded-xl disabled:opacity-50 text-xs"
                                            >
                                                {isGenerating ? "Analizando..." : "Generar con IA"}
                                            </button>
                                        </div>
                                    </form>
                                </div>

                                <div className="space-y-6">
                                    <div className="bg-slate-950 border border-slate-800 p-5 rounded-2xl space-y-4">
                                        <h4 className="font-bold text-xs text-slate-200 uppercase tracking-wider">Prueba rápida con plantilla</h4>
                                        <button
                                            onClick={() => handleLoadPreset(presets[0])}
                                            className="w-full text-left p-3.5 rounded-xl bg-slate-900 hover:bg-slate-850 border border-slate-800 hover:border-teal-500 text-xs transition"
                                        >
                                            <span className="font-bold text-slate-200 text-xs block">{presets[0].title}</span>
                                            <span className="text-[10px] text-slate-400 line-clamp-2 italic mt-1">"{presets[0].rawNetnography.split('\n')[2]}"</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB 3: VISUALIZADOR DE PERFIL */}
                        {activeTab === 'mapa' && generatedPersona && (
                            <div className="space-y-6 sm:space-y-8 animate-fadeIn">
                                {/* Explicación breve de la pestaña */}
                                <div className="bg-slate-950 border border-teal-500/20 p-4 rounded-xl flex items-start gap-3">
                                    <Brain className="h-5 w-5 text-teal-400 shrink-0 mt-0.5" />
                                    <div>
                                        <h4 className="font-extrabold text-teal-300 text-xs sm:text-sm uppercase tracking-wider">Lienzo Psicológico de Buyer Persona</h4>
                                        <p className="text-[11px] sm:text-xs text-slate-300 mt-1 leading-relaxed">
                                            Aquí visualizas la psicología profunda de tu cliente ideal estructurada bajo los frameworks de Mapa de Empatía (Dave Gray) y Jobs-to-be-Done (Clayton Christensen).
                                        </p>
                                    </div>
                                </div>

                                <div className="bg-slate-950 p-5 sm:p-6 rounded-2xl border border-slate-800 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-12 sm:w-14 sm:h-14 rounded-full bg-gradient-to-tr from-teal-500 to-emerald-400 flex items-center justify-center text-slate-950 text-lg sm:text-xl font-black">
                                            {generatedPersona.nombre[0]}
                                        </div>
                                        <div>
                                            <h2 className="text-lg sm:text-xl font-bold text-slate-200">{generatedPersona.nombre}</h2>
                                            <p className="text-xs text-slate-400 mt-1">{generatedPersona.ocupacion} • {generatedPersona.edad}</p>
                                        </div>
                                    </div>
                                    <div className="flex gap-2 w-full sm:w-auto">
                                        <button onClick={downloadTxt} className="flex-1 sm:flex-none bg-slate-900 border border-slate-800 text-slate-300 font-bold px-4 py-2.5 rounded-xl text-xs">Descargar TXT</button>
                                        <button onClick={savePersona} className="flex-1 sm:flex-none bg-gradient-to-r from-teal-500 to-emerald-400 text-slate-950 font-black px-4 py-2.5 rounded-xl text-xs">Guardar Perfil</button>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="bg-slate-950 p-5 sm:p-6 rounded-2xl border border-slate-800 space-y-5">
                                        <h3 className="font-bold text-slate-200 border-b border-slate-800 pb-3 text-sm">Ficha Sociodemográfica</h3>
                                        <p className="text-xs sm:text-sm text-slate-300 bg-slate-900 p-4 rounded-xl border border-slate-800 leading-relaxed">{generatedPersona.resumen_perfil}</p>
                                    </div>

                                    <div className="lg:col-span-2 bg-slate-950 p-5 sm:p-6 rounded-2xl border border-slate-800 space-y-5">
                                        <h3 className="font-bold text-slate-200 border-b border-slate-800 pb-3 text-sm">Trabajos por Hacer (JTBD)</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                            <div className="bg-slate-900 p-4 rounded-xl border border-slate-800">
                                                <span className="text-teal-400 font-extrabold text-[10px] uppercase">Funcional</span>
                                                <p className="text-xs sm:text-sm text-slate-300 mt-1">{generatedPersona.jobs_desglose?.funcional}</p>
                                            </div>
                                            <div className="bg-slate-900 p-4 rounded-xl border border-slate-800">
                                                <span className="text-pink-400 font-extrabold text-[10px] uppercase">Emocional</span>
                                                <p className="text-xs sm:text-sm text-slate-300 mt-1">{generatedPersona.jobs_desglose?.emocional}</p>
                                            </div>
                                            <div className="bg-slate-900 p-4 rounded-xl border border-slate-800">
                                                <span className="text-indigo-400 font-extrabold text-[10px] uppercase">Social</span>
                                                <p className="text-xs sm:text-sm text-slate-300 mt-1">{generatedPersona.jobs_desglose?.social}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <h3 className="text-base sm:text-lg font-bold text-slate-200">El Mapa de Empatía Científico</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                        <div className="bg-slate-950 p-5 rounded-xl border border-slate-800 space-y-3">
                                            <span className="text-pink-400 font-extrabold text-[10px] uppercase tracking-wider block">¿Qué piensa y siente?</span>
                                            {generatedPersona.que_piensa_y_siente?.map((item, i) => <p key={i} className="text-xs sm:text-sm bg-slate-900 p-2.5 rounded-lg leading-relaxed">{item}</p>)}
                                        </div>
                                        <div className="bg-slate-950 p-5 rounded-xl border border-slate-800 space-y-3">
                                            <span className="text-indigo-400 font-extrabold text-[10px] uppercase tracking-wider block">¿Qué ve?</span>
                                            {generatedPersona.que_ve?.map((item, i) => <p key={i} className="text-xs sm:text-sm bg-slate-900 p-2.5 rounded-lg leading-relaxed">{item}</p>)}
                                        </div>
                                        <div className="bg-slate-950 p-5 rounded-xl border border-slate-800 space-y-3">
                                            <span className="text-sky-400 font-extrabold text-[10px] uppercase tracking-wider block">¿Qué oye?</span>
                                            {generatedPersona.que_oye?.map((item, i) => <p key={i} className="text-xs sm:text-sm bg-slate-900 p-2.5 rounded-lg leading-relaxed">{item}</p>)}
                                        </div>
                                        <div className="bg-slate-950 p-5 rounded-xl border border-slate-800 space-y-3">
                                            <span className="text-emerald-400 font-extrabold text-[10px] uppercase tracking-wider block">¿Qué dice y hace?</span>
                                            {generatedPersona.que_dice_y_hace?.map((item, i) => <p key={i} className="text-xs sm:text-sm bg-slate-900 p-2.5 rounded-lg leading-relaxed">{item}</p>)}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB 4: SIMULADOR GAMIFICADO "THE MOM TEST" */}
                        {activeTab === 'simulador' && (
                            <div className="max-w-3xl mx-auto space-y-6 animate-fadeIn">
                                {/* Explicación breve de la pestaña */}
                                <div className="bg-slate-950 border border-teal-500/20 p-4 rounded-xl flex items-start gap-3">
                                    <Users className="h-5 w-5 text-teal-400 shrink-0 mt-0.5" />
                                    <div>
                                        <h4 className="font-extrabold text-teal-300 text-xs sm:text-sm uppercase tracking-wider">¿Qué es el Mom Test Game?</h4>
                                        <p className="text-[11px] sm:text-xs text-slate-300 mt-1 leading-relaxed">
                                            Un simulador interactivo de validación de campo. Aprende a entrevistar clientes reales basándote en el libro "The Mom Test" para evitar opiniones falsas de cortesía.
                                        </p>
                                    </div>
                                </div>

                                <div className="bg-slate-950 border border-slate-800 p-5 sm:p-6 rounded-3xl space-y-4">
                                    <h3 className="font-extrabold text-base sm:text-lg text-slate-200">El Simulador "The Mom Test"</h3>
                                    <p className="text-xs sm:text-sm text-slate-400">Valida tus hipótesis de cliente real con preguntas empíricas y evita los falsos positivos.</p>
                                </div>

                                {!simulatorState.completed ? (
                                    <div className="bg-slate-950 border border-slate-800 rounded-3xl p-5 sm:p-6 space-y-6">
                                        <div className="bg-slate-900 p-4 rounded-xl border border-slate-800 text-xs sm:text-sm text-slate-200 leading-relaxed">
                                            {momTestQuestions[simulatorState.currentQuestionIndex].context}
                                        </div>
                                        <div className="space-y-3">
                                            {momTestQuestions[simulatorState.currentQuestionIndex].options.map((opt, i) => (
                                                <button 
                                                    key={i} 
                                                    onClick={() => handleSimulateAnswer(opt)} 
                                                    className="w-full text-left p-4 rounded-xl bg-slate-900 hover:bg-slate-850 border border-slate-800 text-xs sm:text-sm font-bold text-slate-200 transition flex justify-between items-center gap-2"
                                                >
                                                    <span>{opt.text}</span>
                                                </button>
                                            ))}
                                        </div>
                                        {simulatorState.showFeedback && (
                                            <div className={`p-4 rounded-xl border text-xs sm:text-sm leading-relaxed ${simulatorState.feedbackType === 'buena' ? 'bg-emerald-950/25 border-emerald-500/20 text-emerald-300' : 'bg-rose-950/25 border-rose-500/20 text-rose-300'}`}>
                                                <p className="font-black">{simulatorState.feedbackType === 'buena' ? '✓ Respuesta Correcta' : '⚠️ Alerta de Sesgo'}</p>
                                                <p className="mt-1">{simulatorState.feedbackText}</p>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="bg-slate-950 border border-slate-800 rounded-3xl p-6 text-center space-y-6">
                                        <h4 className="text-lg sm:text-xl font-bold">Simulación Completada</h4>
                                        <p className="text-xs sm:text-sm text-slate-400">Puntaje total obtenido en la entrevista: <span className="font-black text-teal-400">{simulatorState.score}%</span></p>
                                        <button onClick={restartSimulator} className="bg-slate-900 border border-slate-800 text-slate-300 font-bold px-6 py-3 rounded-xl text-xs mx-auto">Reiniciar simulador</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* TAB 5: BIBLIOTECA */}
                        {activeTab === 'ejemplos' && (
                            <div className="space-y-6 sm:space-y-8 animate-fadeIn">
                                {/* Explicación breve de la pestaña */}
                                <div className="bg-slate-950 border border-teal-500/20 p-4 rounded-xl flex items-start gap-3">
                                    <Users className="h-5 w-5 text-teal-400 shrink-0 mt-0.5" />
                                    <div>
                                        <h4 className="font-extrabold text-teal-300 text-xs sm:text-sm uppercase tracking-wider">Historial de Perfiles</h4>
                                        <p className="text-[11px] sm:text-xs text-slate-300 mt-1 leading-relaxed">
                                            Tu base de datos local para guardar, comparar y consultar los arquetipos cualitativos validados que hayas creado.
                                        </p>
                                    </div>
                                </div>

                                <h3 className="text-lg sm:text-xl font-bold">Mis Buyer Personas Guardados</h3>
                                {savedPersonas.length === 0 ? (
                                    <p className="text-xs sm:text-sm text-slate-400">No tienes perfiles guardados de momento.</p>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {savedPersonas.map((persona) => (
                                            <div key={persona.id} className="bg-slate-950 p-5 rounded-2xl border border-slate-800 space-y-3">
                                                <h4 className="font-bold text-slate-200 text-sm">{persona.nombre}</h4>
                                                <p className="text-xs text-slate-400">{persona.ocupacion}</p>
                                                <button onClick={() => { setGeneratedPersona(persona); setActiveTab('mapa'); }} className="w-full bg-slate-900 hover:bg-slate-800 text-xs font-bold py-2.5 rounded-xl">Visualizar</button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* PIE DE PÁGINA PREMIUM CON ENLACES DEL AUTOR */}
                    <footer className="bg-slate-950 border-t border-teal-500/10 py-8 px-4 sm:px-6 text-center text-slate-400 text-xs space-y-3">
                        <p className="max-w-2xl mx-auto leading-relaxed text-[11px] sm:text-xs">
                            Esta aplicación interactiva es un material de apoyo metodológico y práctico para lectores de la <strong>"Guía Científica y Práctica para Construir tu Buyer Persona con IA"</strong>.
                        </p>
                        <p className="text-teal-400 font-bold text-[10px] sm:text-xs uppercase tracking-wider">
                            Desarrollado por <a href="https://rodolfobuitrago.com" target="_blank" rel="noopener noreferrer" class="hover:underline text-teal-300 font-extrabold transition-all">Rodolfo Buitrago</a>
                        </p>
                        <p className="text-slate-500 text-[10px] sm:text-[11px]">
                            Visita <a href="https://rodolfobuitrago.com" target="_blank" rel="noopener noreferrer" className="text-teal-400 hover:underline hover:text-teal-300 font-bold">rodolfobuitrago.com</a> para acceder a más herramientas y programas de entrenamiento de IA aplicados a ventas.
                        </p>
                    </footer>
                </div>
            );
        }

        // Renderizar la app en el DOM
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
